name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: spring3

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Build Maven Project
      run: mvn clean package -DskipTests

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        docker login ${{ secrets.ACR_LOGIN_SERVER }} \
        -u ${{ secrets.ACR_USERNAME }} \
        -p ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/spring3:${{ github.run_number }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/spring3:${{ github.run_number }}

    - name: Configure Web App Container
      run: |
        az webapp config container set \
          --name spring3-devops0518 \
          --resource-group devops \
          --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/spring3:${{ github.run_number }} \
          --docker-registry-server-url https://${{ secrets.ACR_LOGIN_SERVER }} \
          --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
          --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

    - name: Restart Web App
      run: |
        az webapp restart \
          --name spring3-devops0518 \
          --resource-group devops
